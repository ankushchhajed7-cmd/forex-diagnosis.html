<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e27">
    <title>ForexDiagnosis - AI Pair Analysis</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ForexDiagnosis">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            padding: 16px;
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.1) 0%, rgba(0, 255, 150, 0.05) 100%);
            border-radius: 12px;
            border: 1px solid rgba(255, 140, 0, 0.2);
        }

        h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #FFB800 0%, #00FF96 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            color: #888;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .tf-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }

        .tf-btn {
            flex: 1;
            padding: 8px 4px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            color: #888;
            border: 1px solid rgba(255, 140, 0, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tf-btn.active {
            background: rgba(255, 184, 0, 0.2);
            color: #FFB800;
            border-color: #FFB800;
        }

        .confluence-table {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin: 14px 0;
        }

        .confluence-cell {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
        }

        .confluence-cell .tf-label {
            color: #ccc;
            font-weight: 600;
        }

        .confluence-cell .tf-trend {
            font-weight: 700;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .confluence-cell.bullish {
            background: rgba(0, 255, 150, 0.1);
            border: 1px solid rgba(0, 255, 150, 0.3);
        }

        .confluence-cell.bullish .tf-trend {
            color: #00FF96;
        }

        .confluence-cell.bearish {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        .confluence-cell.bearish .tf-trend {
            color: #FF4444;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 140, 0, 0.3);
            color: #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            min-width: 120px;
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #FFB800 0%, #FF8C00 100%);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(255, 140, 0, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 140, 0, 0.2);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            transition: all 0.3s;
        }

        .feature-card:hover {
            background: rgba(255, 140, 0, 0.1);
            border-color: rgba(255, 140, 0, 0.5);
        }

        .feature-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .feature-name {
            font-size: 11px;
            color: #FFB800;
            font-weight: 600;
        }

        .pairs-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .pair-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 140, 0, 0.2);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .pair-card:hover {
            background: rgba(255, 140, 0, 0.08);
            border-color: rgba(255, 140, 0, 0.5);
        }

        .pair-card.selected {
            border-color: #FFB800;
            background: rgba(255, 140, 0, 0.15);
        }

        .pair-name {
            font-size: 16px;
            font-weight: 700;
            color: #FFB800;
            margin-bottom: 6px;
        }

        .pair-price {
            font-size: 12px;
            color: #00FF96;
            margin-bottom: 4px;
        }

        .pair-change {
            font-size: 10px;
            color: #888;
        }

        .analysis-panel {
            background: #0a0e27;
            border: none;
            border-radius: 0;
            padding: 18px;
            padding-top: 50px;
            margin-bottom: 0;
            display: none;
        }

        .analysis-panel.active {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            z-index: 1000;
            animation: slideIn 0.25s ease;
        }

        .panel-close-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1001;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 140, 0, 0.4);
            color: #FFB800;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .diagnosis-header {
            text-align: center;
            margin-bottom: 18px;
        }

        .diagnosis-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .risk-meter {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .circle-gauge {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            position: relative;
            background: conic-gradient(from 0deg, var(--color) 0deg, var(--color) calc(var(--percent) * 3.6deg), rgba(255,255,255,0.1) calc(var(--percent) * 3.6deg));
            border: 2px solid var(--color);
        }

        .gauge-info {
            flex: 1;
        }

        .signal-label {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .signal-label.buy {
            color: #00FF96;
        }

        .signal-label.sell {
            color: #FF4444;
        }

        .signal-label.hold {
            color: #FFB800;
        }

        .risk-level {
            font-size: 12px;
            color: #888;
        }

        .analysis-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 140, 0, 0.1);
            font-size: 13px;
        }

        .analysis-row:last-child {
            border-bottom: none;
        }

        .analysis-label {
            color: #888;
        }

        .analysis-value {
            font-weight: 600;
            color: #e0e0e0;
        }

        .analysis-value.bullish {
            color: #00FF96;
        }

        .analysis-value.bearish {
            color: #FF4444;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .action-buttons button {
            flex: 1;
            padding: 12px;
            font-size: 12px;
        }

        .btn-secondary {
            background: rgba(0, 255, 150, 0.15) !important;
            color: #00FF96 !important;
            border: 1px solid rgba(0, 255, 150, 0.4) !important;
        }

        .btn-secondary:hover {
            background: rgba(0, 255, 150, 0.25) !important;
            box-shadow: 0 8px 16px rgba(0, 255, 150, 0.2) !important;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #FFB800;
        }

        .spinner {
            border: 3px solid rgba(255, 140, 0, 0.2);
            border-top: 3px solid #FFB800;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .free-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FFB800 0%, #FF8C00 100%);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            margin-top: 8px;
        }

        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366 0%, #20BA5C 100%) !important;
            margin-top: 12px;
            width: 100%;
        }

        .whatsapp-btn:hover {
            box-shadow: 0 8px 16px rgba(37, 211, 102, 0.4) !important;
        }

        .error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #FF8888;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 12px;
        }

        .info-text {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .pairs-container {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 20px;
            }

            .circle-gauge {
                width: 80px;
                height: 80px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 ForexDiagnosis</h1>
            <p class="subtitle">AI-Powered Pair Analysis</p>
            <button id="installBtn" onclick="installApp()" style="display:none; margin-top:10px; background: linear-gradient(135deg, #00FF96 0%, #00CC7A 100%); color:#000;">
                📲 Install App
            </button>
            <button onclick="openSettings()" style="margin-top:10px; background: rgba(255,255,255,0.1); color:#FFB800; border:1px solid rgba(255,140,0,0.3);">
                ⚙️ API Settings
            </button>
        </header>

        <div id="newsWarning"></div>

        <div class="controls">
            <input type="text" id="customPair" placeholder="Enter pair (EURUSD)" maxlength="12">
            <button onclick="analyzePair()">Analyze</button>
        </div>

        <div class="tf-selector" style="display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;">
            <button class="tf-btn" data-tf="5min" onclick="setTimeframe('5min', this)">5m</button>
            <button class="tf-btn" data-tf="15min" onclick="setTimeframe('15min', this)">15m</button>
            <button class="tf-btn" data-tf="30min" onclick="setTimeframe('30min', this)">30m</button>
            <button class="tf-btn active" data-tf="1h" onclick="setTimeframe('1h', this)">1H</button>
        </div>

        <div class="analysis-grid">
            <div class="feature-card">
                <div class="feature-icon">🤖</div>
                <div class="feature-name">AI Analysis</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📊</div>
                <div class="feature-name">Multi-Timeframe</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🛡️</div>
                <div class="feature-name">Risk Management</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🎯</div>
                <div class="feature-name">High Probability</div>
            </div>
        </div>

        <div id="pairsContainer" class="pairs-container"></div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin: 20px 0 10px;">
            <span style="font-size:15px; font-weight:700; color:#FFB800;">📒 My Trades</span>
            <span style="display:flex; gap:6px;">
                <button onclick="openStatsWindow()" style="padding:6px 12px; font-size:11px; background:rgba(255,184,0,0.15); color:#FFB800; border:1px solid rgba(255,184,0,0.4);">📊 Stats</button>
                <button onclick="checkTradeResults()" style="padding:6px 12px; font-size:11px; background:rgba(0,255,150,0.15); color:#00FF96; border:1px solid rgba(0,255,150,0.4);">🔄 Check Results</button>
            </span>
        </div>
        <div id="tradeStats" style="display:none; gap:8px; margin-bottom:10px;"></div>
        <div id="tradesList"></div>

        <div id="analysisPanel" class="analysis-panel"></div>

        <div id="statsWindow" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0d0d0d; z-index:1100; overflow-y:auto; font-family:'Courier New', monospace; padding:16px; padding-top:54px;"></div>
        <div id="chartWindow" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0e27; z-index:1200; flex-direction:column;"></div>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importTrades(event)">

        <div class="info-text">
            API by TwelveData | Markets Live
        </div>
    </div>

    <script>
        const API_KEY = 'demo'; // Use your TwelveData API key
        const DEFAULT_PAIRS = ['EURUSD', 'GBPUSD', 'USDJPY', 'AUDUSD', 'XAUUSD', 'NZDUSD'];
        let selectedPair = null;
        const analysisCache = {}; // { 'PAIR_interval': { analysis, confluence, timestamp } }
        let selectedInterval = '1h';

        function closeAnalysisPanel() {
            const panel = document.getElementById('analysisPanel');
            panel.classList.remove('active');
            panel.innerHTML = '';
        }

        function setTimeframe(tf, btn) {
            selectedInterval = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        let pairsData = {};

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderPairCards();
            loadCachedData();
            renderTrades();
            renderNewsWarning();
        });

        // ===== High-Impact News Warning (IST) =====
        function renderNewsWarning() {
            const div = document.getElementById('newsWarning');
            if (!div) return;

            const now = new Date();
            const warnings = [];

            // NFP: First Friday of every month, ~6:00 PM IST
            const firstFriday = (() => {
                const d = new Date(now.getFullYear(), now.getMonth(), 1);
                while (d.getDay() !== 5) d.setDate(d.getDate() + 1);
                return d.getDate();
            })();
            if (now.getDay() === 5 && now.getDate() === firstFriday) {
                warnings.push('📊 <b>NFP Aaj!</b> US Non-Farm Payrolls ~6:00 PM IST - USD pairs aur Gold me bada move aa sakta hai');
            }

            // FOMC 2026 decision days (announcement ~11:30 PM IST)
            const fomcDates = ['2026-01-28', '2026-03-18', '2026-04-29', '2026-06-17', '2026-07-29', '2026-09-16', '2026-10-28', '2026-12-09'];
            const todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
            if (fomcDates.includes(todayStr)) {
                warnings.push('🏦 <b>FOMC Aaj!</b> Fed rate decision ~11:30 PM IST - extreme volatility expected, naye trades avoid karo');
            }
            // FOMC kal hai? (day-before warning)
            const tomorrow = new Date(now.getTime() + 86400000);
            const tomStr = tomorrow.getFullYear() + '-' + String(tomorrow.getMonth() + 1).padStart(2, '0') + '-' + String(tomorrow.getDate()).padStart(2, '0');
            if (fomcDates.includes(tomStr)) {
                warnings.push('🏦 <b>FOMC Kal!</b> Fed decision kal raat - overnight positions careful rakho');
            }

            if (warnings.length === 0) {
                div.innerHTML = '';
                return;
            }

            div.innerHTML = warnings.map(w => `
                <div style="background:rgba(255,68,68,0.1); border:1px solid rgba(255,68,68,0.4); border-radius:10px; padding:12px 14px; margin-bottom:12px; font-size:12px; color:#FFAAAA; line-height:1.5;">
                    ⚠️ ${w}
                </div>
            `).join('');
        }

        function renderPairCards() {
            const container = document.getElementById('pairsContainer');
            container.innerHTML = DEFAULT_PAIRS.map(pair => `
                <div class="pair-card" onclick="selectAndAnalyze('${pair}')">
                    <div class="pair-name">${pair}</div>
                    <div class="pair-price" id="price-${pair}">Loading...</div>
                    <div class="pair-change" id="change-${pair}">--</div>
                </div>
            `).join('');
        }

        async function selectAndAnalyze(pair) {
            selectedPair = pair;
            document.querySelectorAll('.pair-card').forEach(card => {
                card.classList.remove('selected');
            });
            event?.target?.closest('.pair-card')?.classList.add('selected');
            
            await analyzePair(pair);
        }

        async function analyzePair(customPair = null, forceRefresh = false) {
            const rawPair = customPair || document.getElementById('customPair')?.value || selectedPair;
            const pair = rawPair ? rawPair.trim().toUpperCase().replace(/[^A-Z]/g, '') : null;
            if (!pair) return alert('Select or enter a pair');
            if (pair.length !== 6) return alert('Pair 6 letters ka hona chahiye, jaise EURUSD ya XAUUSD');

            const apiKey = localStorage.getItem('td_api_key');
            if (!apiKey) {
                openSettings();
                return;
            }

            const panel = document.getElementById('analysisPanel');

            // Check cache first (5 min validity) unless user explicitly hit Refresh
            const cacheKey = `${pair}_${selectedInterval}`;
            const cached = analysisCache[cacheKey];
            const cacheAge = cached ? Date.now() - cached.timestamp : Infinity;
            if (!forceRefresh && cached && cacheAge < 5 * 60 * 1000) {
                displayAnalysis(pair, cached.analysis, cached.confluence, cached.timestamp, true);
                return;
            }

            panel.innerHTML = '<button class="panel-close-btn" onclick="closeAnalysisPanel()">✕</button><div class="loading"><div class="spinner"></div>Analyzing ' + pair + ' (live, ' + selectedInterval + ')...</div>';
            panel.classList.add('active');

            try {
                const symbol = toTDSymbol(pair.toUpperCase());
                const quote = await tdFetch('quote', symbol, apiKey, selectedInterval);
                const livePrice = parseFloat(quote.close);

                const [analysis, confluence] = await Promise.all([
                    fetchLiveAnalysis(pair.toUpperCase(), apiKey, selectedInterval, livePrice),
                    getMultiTimeframeConfluence(pair.toUpperCase(), apiKey, livePrice)
                ]);

                const timestamp = Date.now();
                analysisCache[cacheKey] = { analysis, confluence, timestamp };
                displayAnalysis(pair.toUpperCase(), analysis, confluence, timestamp, false);
            } catch (error) {
                panel.innerHTML = `<div class="error">❌ ${error.message}</div>`;
            }
        }

        function toTDSymbol(pair) {
            // EURUSD -> EUR/USD, XAUUSD -> XAU/USD
            return pair.slice(0, 3) + '/' + pair.slice(3);
        }

        // Rate limiter: TwelveData free tier allows 8 calls/minute.
        // We cap at 7 to leave a safety buffer and auto-queue/wait instead of erroring out.
        const callTimestamps = [];
        const MAX_CALLS_PER_MINUTE = 7;

        async function waitForRateSlot() {
            while (true) {
                const now = Date.now();
                while (callTimestamps.length && now - callTimestamps[0] > 60000) {
                    callTimestamps.shift();
                }
                if (callTimestamps.length < MAX_CALLS_PER_MINUTE) {
                    callTimestamps.push(Date.now());
                    return;
                }
                const waitTime = 60000 - (now - callTimestamps[0]) + 300;
                updateLoadingMessage(`Free API limit hit - waiting ${Math.ceil(waitTime / 1000)}s...`);
                await new Promise(r => setTimeout(r, waitTime));
            }
        }

        function updateLoadingMessage(msg) {
            const loadingDiv = document.querySelector('.loading');
            if (loadingDiv && loadingDiv.lastChild) {
                loadingDiv.lastChild.textContent = msg;
            }
        }

        async function tdFetch(endpoint, symbol, apiKey, interval, extra = '') {
            await waitForRateSlot();
            const url = `https://api.twelvedata.com/${endpoint}?symbol=${encodeURIComponent(symbol)}&interval=${interval}&apikey=${apiKey}${extra}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.status === 'error' || data.code) {
                throw new Error(data.message || 'API error - check your key or rate limit');
            }
            return data;
        }

        async function fetchLiveAnalysis(pair, apiKey, interval, livePrice) {
            const symbol = toTDSymbol(pair);
            const decimals = pair === 'XAUUSD' ? 2 : (pair === 'USDJPY' ? 3 : 5);

            const [rsiData, macdData, supertrendData, atrData] = await Promise.all([
                tdFetch('rsi', symbol, apiKey, interval, '&time_period=14'),
                tdFetch('macd', symbol, apiKey, interval),
                tdFetch('supertrend', symbol, apiKey, interval, '&period=10&multiplier=3'),
                tdFetch('atr', symbol, apiKey, interval, '&time_period=14')
            ]);

            const price = livePrice;
            const rsi = parseFloat(rsiData.values?.[0]?.rsi || 50);
            const rsiSignal = rsi > 70 ? 'OVERBOUGHT' : rsi < 30 ? 'OVERSOLD' : 'NEUTRAL';

            const macdLine = parseFloat(macdData.values?.[0]?.macd || 0);
            const macdSig = parseFloat(macdData.values?.[0]?.macd_signal || 0);
            const macdBullish = macdLine > macdSig;
            const macdSignal = macdBullish ? 'BULLISH CROSS' : 'BEARISH CROSS';

            // Compare CURRENT live price against the Supertrend line value - this is the
            // standard way to read Supertrend and stays valid until the line itself flips.
            const stValue = parseFloat(supertrendData.values?.[0]?.supertrend || price);
            const supertrend = price > stValue ? 'BULLISH' : 'BEARISH';

            const atr = parseFloat(atrData.values?.[0]?.atr || price * 0.005);

            // Signal from real indicator confluence
            let signal = 'HOLD';
            if (supertrend === 'BULLISH' && macdBullish) signal = 'BUY';
            else if (supertrend === 'BEARISH' && !macdBullish) signal = 'SELL';

            const confluenceCount = (supertrend === 'BULLISH' ? 1 : 0) + (macdBullish ? 1 : 0) + (rsiSignal === 'NEUTRAL' ? 1 : 0);
            const confidence = 50 + confluenceCount * 15;
            const riskScore = rsiSignal !== 'NEUTRAL' ? 70 : (signal === 'HOLD' ? 55 : 35);
            const rrr = '2.0';

            // PULLBACK LIMIT ENTRY: 0.5 ATR better than current price
            // BUY → Buy Limit BELOW current | SELL → Sell Limit ABOVE current
            let entryZone = null, slZone = null, tpZone = null, orderType = null;
            if (signal === 'SELL') {
                orderType = 'SELL LIMIT';
                entryZone = price + atr * 0.5;
                slZone = entryZone + atr * 1.5;
                tpZone = entryZone - atr * 1.5 * parseFloat(rrr);
            } else if (signal === 'BUY') {
                orderType = 'BUY LIMIT';
                entryZone = price - atr * 0.5;
                slZone = entryZone - atr * 1.5;
                tpZone = entryZone + atr * 1.5 * parseFloat(rrr);
            }
            // HOLD = no trade zones, direction unclear

            return {
                signal,
                orderType,
                currentPrice: price.toFixed(decimals),
                riskScore,
                confidence,
                supertrend,
                rsi,
                rsiSignal,
                macd: macdSignal,
                atrHigh: atr,
                rrr,
                entryZone: entryZone !== null ? entryZone.toFixed(decimals) : null,
                slZone: slZone !== null ? slZone.toFixed(decimals) : null,
                tpZone: tpZone !== null ? tpZone.toFixed(decimals) : null
            };
        }

        async function getMultiTimeframeConfluence(pair, apiKey, livePrice) {
            const symbol = toTDSymbol(pair);
            const timeframes = [
                { tf: '5min', label: '5 Minute' },
                { tf: '15min', label: '15 Minute' },
                { tf: '30min', label: '30 Minute' },
                { tf: '1h', label: '1 Hour' }
            ];

            const results = await Promise.all(
                timeframes.map(async ({ tf, label }) => {
                    for (let attempt = 0; attempt < 2; attempt++) {
                        try {
                            const data = await tdFetch('supertrend', symbol, apiKey, tf, '&period=10&multiplier=3');
                            const st = parseFloat(data.values?.[0]?.supertrend);
                            if (isNaN(st)) throw new Error('No data');
                            const trend = livePrice > st ? 'BULLISH' : 'BEARISH';
                            return { label, trend };
                        } catch (e) {
                            if (attempt === 1) return { label, trend: 'N/A' };
                            await new Promise(r => setTimeout(r, 1500));
                        }
                    }
                })
            );

            return results;
        }

        // Live $ risk/reward calculation next to SL/TP inputs
        function updateDollarValues() {
            const a = window.lastAnalysis;
            if (!a || a.signal === 'HOLD') return;
            const entry = parseFloat(document.getElementById('editEntry')?.value);
            const sl = parseFloat(document.getElementById('editSL')?.value);
            const tp = parseFloat(document.getElementById('editTP')?.value);
            const lots = parseFloat(document.getElementById('editLots')?.value);
            const slSpan = document.getElementById('slDollar');
            const tpSpan = document.getElementById('tpDollar');
            if (!slSpan || !tpSpan) return;

            if ([entry, sl, tp, lots].some(isNaN) || lots <= 0) {
                slSpan.textContent = '';
                tpSpan.textContent = '';
                return;
            }

            const toUSD = (diff, refPrice) => {
                if (a.pair === 'XAUUSD') return diff * 100 * lots;
                if (a.pair.endsWith('JPY')) return (diff * 100000 * lots) / refPrice;
                return diff * 100000 * lots;
            };

            const risk = Math.abs(toUSD(entry - sl, sl));
            const reward = Math.abs(toUSD(tp - entry, tp));
            slSpan.textContent = `(−$${risk.toFixed(2)})`;
            tpSpan.textContent = `(+$${reward.toFixed(2)})`;
        }

        // P/L in USD based on pair type, lots, and exit price
        function calcPL(trade) {
            if (trade.status !== 'CLOSED' || !trade.lots) return null;
            const exit = trade.result === 'TP HIT' ? trade.tp : trade.sl;
            const diff = trade.signal === 'BUY' ? (exit - trade.entry) : (trade.entry - exit);
            let pl;
            if (trade.pair === 'XAUUSD') {
                pl = diff * 100 * trade.lots; // 1 lot gold = 100 oz
            } else if (trade.pair.endsWith('JPY')) {
                pl = (diff * 100000 * trade.lots) / exit; // convert JPY P/L to USD
            } else {
                pl = diff * 100000 * trade.lots; // USD-quoted majors
            }
            return pl;
        }

        function fmtPL(pl) {
            if (pl === null || pl === undefined) return '';
            const sign = pl >= 0 ? '+' : '−';
            return `${sign}$${Math.abs(pl).toFixed(2)}`;
        }

        function saveTrades(trades) {
            localStorage.setItem('myTrades', JSON.stringify(trades));

        function recordTrade() {
            if (!window.lastAnalysis) return;
            const a = window.lastAnalysis;
            if (a.signal === 'HOLD') return alert('HOLD signal pe trade record nahi hota');

            // Read EDITED values from inputs (user modify kar sakta hai)
            const entry = parseFloat(document.getElementById('editEntry')?.value);
            const sl = parseFloat(document.getElementById('editSL')?.value);
            const tp = parseFloat(document.getElementById('editTP')?.value);

            if (isNaN(entry) || isNaN(sl) || isNaN(tp)) {
                return alert('Entry/SL/TP values galat hain - numbers check karo');
            }

            // Direction validation - galat side ka SL/TP pakde
            if (a.signal === 'BUY') {
                if (sl >= entry) return alert('❌ BUY trade me SL entry se NEECHE hona chahiye!\nEntry: ' + entry + '\nSL: ' + sl);
                if (tp <= entry) return alert('❌ BUY trade me TP entry se UPAR hona chahiye!\nEntry: ' + entry + '\nTP: ' + tp);
            } else { // SELL
                if (sl <= entry) return alert('❌ SELL trade me SL entry se UPAR hona chahiye!\nEntry: ' + entry + '\nSL: ' + sl);
                if (tp >= entry) return alert('❌ SELL trade me TP entry se NEECHE hona chahiye!\nEntry: ' + entry + '\nTP: ' + tp);
            }

            const lots = parseFloat(document.getElementById('editLots')?.value);
            if (isNaN(lots) || lots <= 0) return alert('Lot size galat hai - panel me sahi number daalo jaise 0.01');

            const trades = getTrades();
            const trade = {
                id: Date.now(),
                pair: a.pair,
                signal: a.signal,
                orderType: a.orderType || (a.signal + ' LIMIT'),
                lots: lots,
                entry: entry,
                sl: sl,
                tp: tp,
                openTime: new Date().toISOString(),
                status: 'OPEN',
                filled: false,
                result: null,
                closeTime: null
            };
            trades.unshift(trade);
            trades.splice(100); // keep last 100
            saveTrades(trades);
            alert('✅ Trade record ho gaya!\nEntry: ' + entry + '\nSL: ' + sl + '\nTP: ' + tp + '\n\nDashboard pe "My Trades" me dikhega.');
            closeAnalysisPanel();

                    const key = monthKey(t);
                    if (!monthGroups[key]) monthGroups[key] = { label: monthLabel(t), trades: [] };
                    monthGroups[key].trades.push(t);
                });

                html += `<div style="font-size:12px; font-weight:700; color:#888; margin:16px 0 8px;">📁 Previous Months (Summary)</div>`;

                // Sort newest month first
                Object.keys(monthGroups).sort().reverse().forEach(key => {
                    const g = monthGroups[key];
                    const mClosed = g.trades.filter(t => t.status === 'CLOSED');
                    const mWins = mClosed.filter(t => t.result === 'TP HIT').length;
                    const mLosses = mClosed.filter(t => t.result === 'SL HIT').length;
                    const mOpen = g.trades.filter(t => t.status === 'OPEN').length;
                    const mRate = mClosed.length ? ((mWins / mClosed.length) * 100).toFixed(0) + '%' : '--';
                    html += `
                    <div style="background:rgba(255,255,255,0.02); border:1px solid rgba(255,140,0,0.15); border-radius:10px; padding:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:600; color:#ccc; font-size:12px;">${g.label}</span>
                        <span style="font-size:11px;">
                            <span style="color:#00FF96;">✅ ${mWins}</span> &nbsp;
                            <span style="color:#FF4444;">❌ ${mLosses}</span> &nbsp;
                            ${mOpen > 0 ? `<span style="color:#FFB800;">⏳ ${mOpen}</span> &nbsp;` : ''}
                            <span style="color:#e0e0e0; font-weight:700;">${mRate}</span>
                        </span>
                    </div>`;
                });
            }

            list.innerHTML = html;
        }

        function deleteTrade(id) {
            if (!confirm('Ye trade delete karna hai?')) return;
            saveTrades(getTrades().filter(t => t.id !== id));
            renderTrades();
        }

        // ===== Live Chart (TradingView) =====
        let chartPair = null;
        let chartInterval = '60';

        function tvSymbol(pair) {
            if (pair === 'XAUUSD') return 'OANDA:XAUUSD';
            return 'FX:' + pair;
        }

        function openChart(pair) {
            chartPair = pair;
            renderChart();
        }

        function setChartTF(tf, btn) {
            chartInterval = tf;
            renderChart();
        }

        function renderChart() {
            const win = document.getElementById('chartWindow');
            const tfs = [
                { v: '5', l: '5m' },
                { v: '15', l: '15m' },
                { v: '30', l: '30m' },
                { v: '60', l: '1H' },
                { v: '240', l: '4H' },
                { v: 'D', l: '1D' }
            ];
            const tfButtons = tfs.map(t => `
                <button onclick="setChartTF('${t.v}')" style="flex:1; padding:8px 4px; font-size:12px; font-weight:600; background:${chartInterval === t.v ? 'rgba(255,184,0,0.25)' : 'rgba(255,255,255,0.05)'}; color:${chartInterval === t.v ? '#FFB800' : '#888'}; border:1px solid ${chartInterval === t.v ? '#FFB800' : 'rgba(255,140,0,0.2)'}; border-radius:8px;">${t.l}</button>
            `).join('');

            const src = `https://s.tradingview.com/widgetembed/?symbol=${encodeURIComponent(tvSymbol(chartPair))}&interval=${chartInterval}&theme=dark&style=1&locale=en&hide_side_toolbar=1&allow_symbol_change=0&save_image=0`;

            win.style.display = 'flex';
            win.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 12px; background:#0d0d0d; border-bottom:1px solid rgba(255,140,0,0.3);">
                    <span style="font-weight:700; color:#FFB800; font-size:15px;">📈 ${chartPair} Live</span>
                    <button onclick="closeChart()" style="width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,140,0,0.4); color:#FFB800; font-size:15px;">✕</button>
                </div>
                <div style="display:flex; gap:5px; padding:8px 10px; background:#0d0d0d;">
                    ${tfButtons}
                </div>
                <iframe src="${src}" style="flex:1; width:100%; border:none;" allowfullscreen></iframe>
            `;
        }

        function closeChart() {
            const win = document.getElementById('chartWindow');
            win.style.display = 'none';
            win.innerHTML = '';
        }

        // ===== Terminal-Style Stats Window =====
        function openStatsWindow() {
            const win = document.getElementById('statsWindow');
            win.innerHTML = buildStatsHTML();
            win.style.display = 'block';
        }

        function closeStatsWindow() {
            document.getElementById('statsWindow').style.display = 'none';
        }

        function buildStatsHTML() {
            const trades = getTrades();
            const closed = trades.filter(t => t.status === 'CLOSED');
            const wins = closed.filter(t => t.result === 'TP HIT').length;
            const losses = closed.filter(t => t.result === 'SL HIT').length;
            const pending = trades.filter(t => t.status === 'OPEN').length;
            const acc = closed.length ? ((wins / closed.length) * 100).toFixed(0) : 0;
            // Expectancy with RRR 2:1 → win gives +2R, loss gives -1R
            const expectancy = closed.length ? (((wins * 2) - losses) / closed.length).toFixed(2) : '0.00';
            const totalPL = closed.reduce((sum, t) => {
                const pl = t.pl !== undefined && t.pl !== null ? t.pl : calcPL(t);
                return sum + (pl || 0);
            }, 0);
            const plColor = totalPL >= 0 ? '#00FF96' : '#FF4444';

            const A = '#FFB800'; // amber
            const box = `background:#141414; border:1px solid #2a2a2a; border-radius:8px;`;
            const statBox = (val, label, color = A) => `
                <div style="${box} flex:1; text-align:center; padding:16px 4px;">
                    <div style="font-size:24px; font-weight:700; color:${color};">${val}</div>
                    <div style="font-size:10px; color:#777; letter-spacing:2px; margin-top:4px;">${label}</div>
                </div>`;

            // Pair-wise stats
            const pairMap = {};
            trades.forEach(t => {
                if (!pairMap[t.pair]) pairMap[t.pair] = { total: 0, tp: 0, sl: 0 };
                pairMap[t.pair].total++;
                if (t.result === 'TP HIT') pairMap[t.pair].tp++;
                if (t.result === 'SL HIT') pairMap[t.pair].sl++;
            });
            const pairRows = Object.keys(pairMap).map(p => {
                const s = pairMap[p];
                const pClosed = s.tp + s.sl;
                const pAcc = pClosed ? ((s.tp / pClosed) * 100).toFixed(0) + '%' : '—';
                return `<tr style="border-bottom:1px solid #222;">
                    <td style="padding:10px 4px; color:#eee; font-weight:700;">${p}</td>
                    <td style="padding:10px 4px; text-align:center; color:#ccc;">${s.total}</td>
                    <td style="padding:10px 4px; text-align:center; color:#00FF96;">${s.tp}</td>
                    <td style="padding:10px 4px; text-align:center; color:#FF4444;">${s.sl}</td>
                    <td style="padding:10px 4px; text-align:center; color:${A};">${pAcc}</td>
                </tr>`;
            }).join('') || `<tr><td colspan="5" style="padding:14px; color:#666;">Abhi koi trade nahi</td></tr>`;

            // Monthly stats
            const monthMap = {};
            trades.forEach(t => {
                const d = new Date(t.openTime);
                const key = `${d.getFullYear()}-${String(d.getMonth()).padStart(2, '0')}`;
                const label = d.toLocaleDateString('en-IN', { month: 'short', year: 'numeric' });
                if (!monthMap[key]) monthMap[key] = { label, total: 0, tp: 0, sl: 0, pl: 0 };
                monthMap[key].total++;
                if (t.result === 'TP HIT') monthMap[key].tp++;
                if (t.result === 'SL HIT') monthMap[key].sl++;
                if (t.status === 'CLOSED') {
                    const tpl = t.pl !== undefined && t.pl !== null ? t.pl : calcPL(t);
                    monthMap[key].pl += (tpl || 0);
                }
            });
            const monthRows = Object.keys(monthMap).sort().reverse().map(k => {
                const m = monthMap[k];
                const mClosed = m.tp + m.sl;
                const mAcc = mClosed ? ((m.tp / mClosed) * 100).toFixed(0) + '%' : '—';
                const mPLColor = m.pl >= 0 ? '#00FF96' : '#FF4444';
                return `<tr style="border-bottom:1px solid #222;">
                    <td style="padding:10px 4px; color:#eee;">${m.label}</td>
                    <td style="padding:10px 4px; text-align:center; color:#ccc;">${m.total}</td>
                    <td style="padding:10px 4px; text-align:center; color:#00FF96;">${m.tp}</td>
                    <td style="padding:10px 4px; text-align:center; color:#FF4444;">${m.sl}</td>
                    <td style="padding:10px 4px; text-align:center; color:${A};">${mAcc}</td>
                    <td style="padding:10px 4px; text-align:center; color:${mPLColor}; font-weight:700;">${mClosed ? fmtPL(m.pl) : '—'}</td>
                </tr>`;
            }).join('') || `<tr><td colspan="6" style="padding:14px; color:#666;">Abhi koi closed trade nahi</td></tr>`;

            const th = `padding:8px 4px; font-size:10px; color:#777; letter-spacing:2px; text-align:center; border-bottom:1px solid #333;`;

            return `
                <button onclick="closeStatsWindow()" style="position:fixed; top:12px; right:12px; z-index:1101; width:36px; height:36px; border-radius:50%; background:#1a1a1a; border:1px solid ${A}; color:${A}; font-size:16px;">✕</button>

                <div style="${box} padding:16px; margin-bottom:14px;">
                    <div style="font-size:20px; font-weight:700; color:${A}; letter-spacing:3px; margin-bottom:6px;">PERFORMANCE</div>
                    <div style="font-size:11px; color:#777; margin-bottom:14px;">Accuracy = TP / (TP+SL). Trade record karke "Check Results" se auto-update hota hai.</div>
                    <div style="display:flex; gap:8px; margin-bottom:8px;">
                        ${statBox(closed.length, 'CLOSED')}
                        ${statBox(acc + '%', 'ACCURACY')}
                        ${statBox(expectancy + 'R', 'EXPECTANCY')}
                    </div>
                    <div style="display:flex; gap:8px;">
                        ${statBox(wins, 'TP HIT', '#00FF96')}
                        ${statBox(losses, 'SL HIT', '#FF4444')}
                        ${statBox(pending, 'PENDING')}
                    </div>
                    <div style="display:flex; gap:8px; margin-top:8px;">
                        ${statBox(fmtPL(totalPL) || '$0.00', 'TOTAL P/L', plColor)}
                    </div>
                </div>

                <div style="${box} padding:16px; margin-bottom:14px;">
                    <div style="font-size:20px; font-weight:700; color:${A}; letter-spacing:3px; margin-bottom:10px;">PAIR-WISE</div>
                    <table style="width:100%; border-collapse:collapse; font-size:13px;">
                        <tr>
                            <th style="${th} text-align:left;">PAIR</th>
                            <th style="${th}">TRADES</th>
                            <th style="${th}">TP</th>
                            <th style="${th}">SL</th>
                            <th style="${th}">ACC%</th>
                        </tr>
                        ${pairRows}
                    </table>
                </div>

                <div style="${box} padding:16px; margin-bottom:14px;">
                    <div style="font-size:20px; font-weight:700; color:${A}; letter-spacing:3px; margin-bottom:10px;">MONTHLY</div>
                    <table style="width:100%; border-collapse:collapse; font-size:13px;">
                        <tr>
                            <th style="${th} text-align:left;">MONTH</th>
                            <th style="${th}">TRADES</th>
                            <th style="${th}">TP</th>
                            <th style="${th}">SL</th>
                            <th style="${th}">ACC%</th>
                            <th style="${th}">P/L</th>
                        </tr>
                        ${monthRows}
                    </table>
                </div>

                <div style="${box} padding:16px; margin-bottom:20px;">
                    <div style="font-size:20px; font-weight:700; color:${A}; letter-spacing:3px; margin-bottom:10px;">BACKUP</div>
                    <div style="font-size:11px; color:#777; margin-bottom:12px;">Trade history JSON file me export karo. Phone change ya cache clear se pehle backup zaroor lo.</div>
                    <div style="display:flex; gap:10px;">
                        <button onclick="exportTrades()" style="flex:1; padding:12px; background:#1a1a1a; color:#00FF96; border:1px solid rgba(0,255,150,0.4); border-radius:8px; font-family:inherit; font-weight:700;">⬇ EXPORT</button>
                        <button onclick="document.getElementById('importFile').click()" style="flex:1; padding:12px; background:#1a1a1a; color:${A}; border:1px solid rgba(255,184,0,0.4); border-radius:8px; font-family:inherit; font-weight:700;">⬆ IMPORT</button>
                    </div>
                </div>
            `;
        }

        // ===== Backup / Restore =====
        function exportTrades() {
            const trades = getTrades();
            if (trades.length === 0) return alert('Koi trade nahi hai export karne ke liye.');
            const blob = new Blob([JSON.stringify(trades, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const dateStr = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `forex-trades-backup-${dateStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importTrades(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) throw new Error('Invalid format');

                    const existing = getTrades();
                    const existingIds = new Set(existing.map(t => t.id));
                    const newTrades = imported.filter(t => t.id && !existingIds.has(t.id));

                    const merged = [...existing, ...newTrades].sort((a, b) => b.id - a.id);
                    merged.splice(100);
                    saveTrades(merged);
                    renderTrades();
                    openStatsWindow(); // refresh stats view
                    alert(`✅ ${newTrades.length} naye trade(s) import hue! (Duplicates skip kiye)`);
                } catch (err) {
                    alert('❌ File galat hai - sirf is app se export ki hui JSON file use karo.');
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        async function checkTradeResults() {
            const apiKey = localStorage.getItem('td_api_key');
            if (!apiKey) return openSettings();

            const trades = getTrades();
            const openTrades = trades.filter(t => t.status === 'OPEN');
            if (openTrades.length === 0) return alert('Koi OPEN trade nahi hai check karne ke liye.');

            const btn = event?.target;
            if (btn) { btn.textContent = '⏳ Checking...'; btn.disabled = true; }

            let updated = 0;
            for (const trade of openTrades) {
                try {
                    const symbol = toTDSymbol(trade.pair);
                    // Fetch 5min candles since trade open - FORCE UTC timezone so start_date
                    // and candle datetimes match our stored UTC openTime exactly
                    const openMs = new Date(trade.openTime).getTime();
                    const startDate = new Date(trade.openTime).toISOString().slice(0, 19).replace('T', ' ');
                    const data = await tdFetch('time_series', symbol, apiKey, '5min', `&start_date=${encodeURIComponent(startDate)}&outputsize=500&order=ASC&timezone=UTC`);
                    const candles = data.values || [];

                    for (const c of candles) {
                        // Safety: skip any candle that OPENED before the trade was taken.
                        const candleMs = new Date(c.datetime.replace(' ', 'T') + 'Z').getTime();
                        if (isNaN(candleMs) || candleMs < openMs) continue;

                        const high = parseFloat(c.high);
                        const low = parseFloat(c.low);

                        // PHASE 1: Limit order fill check (price must touch entry first)
                        if (!trade.filled) {
                            const touchedEntry = trade.signal === 'BUY'
                                ? low <= trade.entry   // Buy Limit fills when price dips to entry
                                : high >= trade.entry; // Sell Limit fills when price rises to entry
                            if (touchedEntry) {
                                trade.filled = true;
                                trade.fillTime = c.datetime;
                                updated++;
                                // Conservative: same candle jisme fill hua, usme SL bhi hit ho sakta hai
                                // (wick order unknown → SL maan lete hain agar touched)
                            } else {
                                continue; // abhi fill nahi hua - SL/TP check mat karo
                            }
                        }

                        // PHASE 2: SL/TP check (sirf fill hone ke baad)
                        let result = null;
                        if (trade.signal === 'BUY') {
                            if (low <= trade.sl) result = 'SL HIT';
                            else if (high >= trade.tp) result = 'TP HIT';
                        } else { // SELL
                            if (high >= trade.sl) result = 'SL HIT';
                            else if (low <= trade.tp) result = 'TP HIT';
                        }

                        if (result) {
                            trade.status = 'CLOSED';
                            trade.result = result;
                            trade.closeTime = c.datetime;
                            trade.pl = calcPL(trade);
                            updated++;
                            break;
                        }
                    }
                } catch (e) {
                    console.log('Check failed for', trade.pair, e.message);
                }
            }

            saveTrades(trades);
            renderTrades();
            if (btn) { btn.textContent = '🔄 Check Results'; btn.disabled = false; }
            alert(updated > 0 ? `✅ ${updated} trade(s) ka result update hua!` : 'Abhi koi trade TP/SL tak nahi pahucha - sab OPEN hain.');
        }

        // ===== PWA Install & Service Worker =====
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (installBtn) installBtn.style.display = 'block';
        });

        function installApp() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('PWA installed');
                }
                deferredPrompt = null;
                if (installBtn) installBtn.style.display = 'none';
            });
        }

        window.addEventListener('appinstalled', () => {
            if (installBtn) installBtn.style.display = 'none';
            deferredPrompt = null;
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('SW registered:', reg.scope))
                    .catch((err) => console.log('SW registration failed:', err));
            });
        }
    </script>
